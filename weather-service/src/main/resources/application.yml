server:
  port: 8082

spring:
  application:
    name: weather-service

  data:
    mongodb:
      uri: mongodb://wish:wish123@localhost:27017/wishweather?authSource=wishnotification

      auto-index-creation: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=30m
    
  codec:
    max-in-memory-size: 16MB

  webflux:
    base-path: /api/v1

# Weather API Configuration
weather:
  api:
    api-key: "dJ%2B1bX3L4D5nk3DlGR7hHcEexw5lZK9kOiQYE3SUIEmLH7O%2FHd%2F7TBDEWzgPvqQJbYyWJpgLjR67KsK59dX3ow%3D%3D"
    base-url: "http://apis.data.go.kr/1360000/VilageFcstInfoService_2.0"
    village-fcst-url: "/getVilageFcst"
    ultra-srt-fcst-url: "/getUltraSrtFcst"
