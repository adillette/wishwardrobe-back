version: '3.8'

services:
  #gateway service
  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - clothes-service
      - weather-service
      - notification-service
    networks:
      - wishwordrobe-network
    restart: unless-stopped
  # Clothes Service - 의류 관리 서비스 (WebMVC)
  clothes-service:
    build:
      context: ./clothes-service
      dockerfile: Dockerfile
    container_name: clothes-service
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - clothes-uploads:/app/uploads
    depends_on:
      oracle-db:
        condition: service_healthy
    networks:
      - wishwordrobe-network
    restart: unless-stopped

  # Oracle Database - 의류 데이터 저장
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: wishwordrobe-oracle
    ports:
      - "1521:1521"
    env_file:
      - .env
    
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - wishwordrobe-network
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
  
  # Weather Service - 날씨 정보 서비스 (WebFlux)
  weather-service:
    build:
      context: ./weather-service
      dockerfile: Dockerfile
    container_name: weather-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      
    networks:
      - wishwordrobe-network
    restart: unless-stopped


  # MongoDB - 날씨 및 알림 데이터 저장
  mongodb:
    image: mongo:7
    container_name: wishwordrobe-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb-data:/data/db
    networks:
      - wishwordrobe-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 3s
      retries: 5

  

  # Notification Service - 알림 서비스 (WebFlux)
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    
    volumes:
      - ./notification-service/src/main/resources/service-account-key.json:/app/service-account-key.json:ro
    depends_on:
      mongodb:
        condition: service_healthy
      
    networks:
      - wishwordrobe-network
    restart: unless-stopped

  # Frontend - Vue.js Application
  wishwardrobe-front:
    build:
      context: ../wishwardrobe-front
      dockerfile: Dockerfile
    container_name: wishwardrobe-front
    ports:
      - "3000:80"
    env_file:
      - .env
    
    depends_on:
      - gateway-service
    networks:
      - wishwordrobe-network
    restart: unless-stopped

networks:
  wishwordrobe-network:
    driver: bridge

volumes:
  oracle-data:
  clothes-uploads:
