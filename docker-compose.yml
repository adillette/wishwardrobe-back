version: '3.8'

services:

  # RabbitMQ - 메시지 브로커
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # // AMQP 프로토콜 포트 (서비스 간 통신)
      - "15672:15672"  # // 관리 UI 포트 (브라우저에서 확인용)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - wishwordrobe-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      # // healthcheck: 서비스들이 RabbitMQ 뜨기 전에 연결 시도하는 것 방지

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - clothes-service
      - weather-service
      - notification-service
    networks:
      - wishwordrobe-network
    restart: unless-stopped

  clothes-service:
    build:
      context: ./clothes-service
      dockerfile: Dockerfile
    container_name: clothes-service
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
      # // docker-compose 내부에서는 서비스명이 호스트명
      # // application.yml의 ${RABBITMQ_HOST:localhost}가 이 값을 참조
    volumes:
      - clothes-uploads:/app/uploads
    depends_on:
      rabbitmq:
        condition: service_healthy
        # // RabbitMQ 완전히 뜬 후에 clothes-service 시작
    networks:
      - wishwordrobe-network
    restart: unless-stopped

  weather-service:
    build:
      context: ./weather-service
      dockerfile: Dockerfile
    container_name: weather-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - wishwordrobe-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./notification-service/src/main/resources/service-account-key.json:/app/service-account-key.json:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - wishwordrobe-network
    restart: unless-stopped

  wishwardrobe-front:
    build:
      context: /home/ubuntu/wishwardrobe-front
      args:
        - VUE_APP_KAKAO_JS_KEY=${VUE_APP_KAKAO_JS_KEY}
      dockerfile: Dockerfile
    container_name: wishwardrobe-front
    ports:
      - "3000:80"
    env_file:
      - .env
    depends_on:
      - gateway-service
    networks:
      - wishwordrobe-network
    restart: unless-stopped

networks:
  wishwordrobe-network:
    driver: bridge

volumes:
  clothes-uploads: