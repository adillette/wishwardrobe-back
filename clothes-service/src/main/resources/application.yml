server:
  port: 8081

spring:
  application:
    name: clothes-service

  # RabbitMQ 설정
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
      enabled: true

  datasource:
    url: jdbc:h2:mem:clothesdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: create-drop

  h2:
    console:
      enabled: true
      path: /h2-console

  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30분 (밀리초)

  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# File Upload Configuration
file:
  upload-dir: D:/uploadFiles
  uploadDir: D:/uploadFiles
  uploadFiles: D:/uploadFiles

# JWT Configuration
# jwt:
#   issuer: wishful@gmail.com
#   secret_key: iwish

# Logging
logging:
  level:
    today.wishwordrobe: DEBUG
    org.springframework.cache: DEBUG
    org.springframework.amqp: DEBUG

# MSA Service URLs
services:
  weather:
    url: http://localhost:8082
