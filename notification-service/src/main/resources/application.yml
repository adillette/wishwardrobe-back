server:
  port: 8083

spring:
  application:
    name: notification-service

  data:
    mongodb:

      uri: ${MONGODB_URI_NOTIFICATION}
      #  uri: mongodb://wish:wish123@localhost:27017/wishnotification?authSource=wishnotification&maxPoolSize=1000&minPoolSize=100&maxWaitTime=5000&socketTimeout=10000&connectTimeout=5000
      auto-index-creation: true
  
  codec:
    max-in-memory-size: 16MB

  webflux:
    base-path: /api

# Firebase Configuration
firebase:
  config-path: file:/app/service-account-key.json

# Web Push Configuration
webpush:
  public-key: ${WEBPUSH_PUBLIC_KEY}
  private-key: ${WEBPUSH_PRIVATE_KEY}
  subject: mailto:wishful@gmail.com

# clothes Service 연동 추가
clothes-service:
  base-url: http://localhost:8081/api/clothes

# Weather Service 연동 (추가)
weather-service:
  base-url: http://localhost:8082/api/v1

notification:
  daily:
    enabled: true
    cron: "0 0 9 * * *"
    lat: 37.5665
    lon: 126.9780
    location-label: "서울(시청)"
    zone: Asia/Seoul
    mobile-topic: daily-weather
    default-user-id: 1  # ← 추천 이미지 가져올 대표 사용자
    mobile-title: "오늘의 날씨"
    web-title: "오늘의 날씨"
    click-action: "http://localhost:8083"
# Logging
logging:
  level:
    today.wishwordrobe: DEBUG
    com.google.firebase: DEBUG
    org.springframework.web.reactive: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
      base-path: /actuator
  server:
    port: 9091
  prometheus:
    metrics:
      export:
        enabled: true
      # enable: 
      #   jvm: false
      #   system: false
      #   process: false 
      #   executor: false
      #   logback: false