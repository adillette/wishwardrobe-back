<!DOCTYPE html>
<html>

<head>
    <title>FCM Push Test</title>
    <meta charset="UTF-8">
</head>

<body>
    <h1>FCM 푸시 알림 테스트</h1>
    <button id="requestPermission">알림 권한 요청</button>
    <button id="getToken">FCM 토큰 가져오기</button>
    <div id="token" style="margin-top: 20px; word-break: break-all;"></div>

    <script type="module">
        // Firebase 설정 - 본인의 Firebase 프로젝트 정보로 변경하세요
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js';

        const firebaseConfig = {
            apiKey: "AIzaSyB4zfupHNoGbDuCfDGbCz__aiFFEvQNhkM",
            authDomain: "today-wardrobe.firebaseapp.com",
            projectId: "today-wardrobe",
            storageBucket: "today-wardrobe.firebasestorage.app",
            messagingSenderId: "243188962870",
            appId: "1:243188962870:web:7930cc6d88872038b5ea97",
            measurementId: "G-P7KPC9BNV1"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        // Service Worker 등록
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./firebase-messaging-sw.js')
                .then((registration) => {
                    console.log('Service Worker 등록 성공:', registration);
                })
                .catch((err) => {
                    console.error('Service Worker 등록 실패:', err);
                });
        }

        document.getElementById('requestPermission').addEventListener('click', async () => {
            const permission = await Notification.requestPermission();
            document.getElementById('token').innerHTML = `<p>권한: ${permission}</p>`;
        });

        document.getElementById('getToken').addEventListener('click', async () => {
            try {
                // Service Worker가 활성화될 때까지 대기
                const registration = await navigator.serviceWorker.ready;
                console.log('Service Worker ready:', registration);

                const currentToken = await getToken(messaging, {
                    vapidKey: 'BP4LfGdxmHwrq-rKtbXnIhtX89V68HGH1BM96mlWWdimEj5M7_ow5gZ6zkbulDJaTdb7lzyCpi35RJJwVl819gI',
                    serviceWorkerRegistration: registration
                });

                if (currentToken) {
                    document.getElementById('token').innerHTML = `
                        <h3>FCM 토큰:</h3>
                        <textarea rows="5" cols="80">${currentToken}</textarea>
                        <p>이 토큰을 복사해서 Postman에서 사용하세요!</p>
                    `;
                    console.log('FCM Token:', currentToken);
                } else {
                    console.log('토큰을 가져올 수 없습니다.');
                    document.getElementById('token').innerHTML = `<p style="color:red">토큰을 가져올 수 없습니다. Firebase 설정을 확인하세요.</p>`;
                }
            } catch (err) {
                console.error('토큰 가져오기 실패:', err);
                document.getElementById('token').innerHTML = `<p style="color:red">에러: ${err.message}</p>`;
            }
        });

        // 포그라운드 메시지 수신
        onMessage(messaging, (payload) => {
            console.log('메시지 수신:', payload);
            alert(`알림 도착!\n제목: ${payload.notification.title}\n내용: ${payload.notification.body}`);
        });
    </script>
</body>

</html>
