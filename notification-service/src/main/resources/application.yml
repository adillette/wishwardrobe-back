server:
  port: 8083

spring:
  application:
    name: notification-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/wishnotification
      auto-index-creation: true

    redis:
      host: localhost
      port: 6379
      database: 3
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  codec:
    max-in-memory-size: 16MB

  webflux:
    base-path: /api

